name: Release Windows Build

# v* タグ（例: v1.0.0）を push すると起動し、Windows exe をビルドして Release に添付する
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release を作成するタグ名（例: v1.0.0）'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Windows binary
        shell: bash
        run: wails build -platform windows/amd64

      # exe が大きいため zip 化して添付する。ライセンス表示物（LICENSE /
      # THIRD_PARTY_LICENSES.md = D2 の MPL-2.0 等）も同梱して配布要件を満たす。
      - name: Package zip
        shell: pwsh
        run: |
          $staging = "release"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item build/bin/sirusita.exe $staging/
          Copy-Item LICENSE $staging/
          Copy-Item THIRD_PARTY_LICENSES.md $staging/
          Copy-Item README.md $staging/
          Compress-Archive -Path "$staging/*" -DestinationPath build/bin/sirusita-windows-amd64.zip -Force

      - name: Upload zip to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: build/bin/sirusita-windows-amd64.zip
          fail_on_unmatched_files: true
